<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幸运大转盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 40%, #0d1b4b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      overflow: hidden;
    }

    /* 星星背景 */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 4px;
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
    }

    /* 奖品说明 */
    .prizes-info {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .prize-badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .badge-1 { background: rgba(255,50,50,0.25); color: #ff8080; border-color: #ff5050; }
    .badge-2 { background: rgba(255,165,0,0.25); color: #ffcc66; border-color: #ffa500; }
    .badge-3 { background: rgba(100,200,100,0.25); color: #88ee88; border-color: #66cc66; }
    .badge-c { background: rgba(100,150,255,0.25); color: #aaccff; border-color: #6699ff; }

    /* 转盘区域 */
    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    /* 外圈装饰光晕 */
    .wheel-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 440px; height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes pulse-glow {
      from { box-shadow: 0 0 30px rgba(255,215,0,0.3), inset 0 0 30px rgba(255,215,0,0.1); }
      to   { box-shadow: 0 0 60px rgba(255,215,0,0.6), inset 0 0 60px rgba(255,215,0,0.2); }
    }

    canvas#wheelCanvas {
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.3);
      display: block;
    }

    /* 指针 */
    .pointer {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 50px solid #ffd700;
      filter: drop-shadow(0 4px 8px rgba(255,215,0,0.8));
      z-index: 10;
    }
    .pointer::after {
      content: '';
      position: absolute;
      top: -54px;
      left: -8px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,215,0,1);
    }

    /* 中心按钮 */
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff9c4, #ffd700 50%, #ff8c00);
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 4px 12px rgba(0,0,0,0.5);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 900;
      color: #7b3f00;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .center-btn:hover:not(:disabled) {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 0 30px rgba(255,215,0,1), 0 4px 16px rgba(0,0,0,0.5);
    }
    .center-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) scale(0.95);
    }
    .center-btn:disabled {
      cursor: not-allowed;
      filter: brightness(0.7);
    }

    /* 抽奖次数 */
    .count-info {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
    .count-info span {
      color: #ffd700;
      font-weight: bold;
      font-size: 1.1rem;
    }

    /* 大抽奖按钮 */
    .spin-btn {
      padding: 14px 60px;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 3px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #3d1a00;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,140,0,0.5), 0 2px 6px rgba(0,0,0,0.4);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .spin-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: rgba(255,255,255,0.3);
      transform: skewX(-20deg);
      transition: left 0.4s;
    }
    .spin-btn:hover:not(:disabled)::before { left: 120%; }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(255,140,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
    }
    .spin-btn:active:not(:disabled) { transform: translateY(1px); }
    .spin-btn:disabled {
      background: linear-gradient(135deg, #888, #555);
      color: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 结果弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: linear-gradient(145deg, #1e0845, #2d1060);
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,0.3), 0 20px 60px rgba(0,0,0,0.5);
      animation: modal-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 380px;
      width: 90%;
    }
    @keyframes modal-in {
      from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .modal-emoji {
      font-size: 4rem;
      margin-bottom: 12px;
      animation: bounce 0.6s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .modal-title {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .modal-prize {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .modal-desc {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .modal-close {
      padding: 12px 40px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #3d1a00;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(255,140,0,0.4);
    }
    .modal-close:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255,140,0,0.6);
    }

    /* 历史记录 */
    .history {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 24px;
      width: 420px;
      max-height: 140px;
      overflow-y: auto;
    }
    .history h3 {
      color: rgba(255,215,0,0.8);
      font-size: 0.85rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-item:last-child { border-bottom: none; }
    .history-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 彩带动画 */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 99;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      top: -20px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* 滚动条样式 */
    .history::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-track { background: transparent; }
    .history::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }
  </style>
</head>
<body>

<!-- 星星背景 -->
<div class="stars" id="stars"></div>

<!-- 彩带容器 -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- 结果弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎉</div>
    <div class="modal-title">恭喜您获得</div>
    <div class="modal-prize" id="modalPrize">一等奖</div>
    <div class="modal-desc" id="modalDesc">大奖已收入囊中！</div>
    <button class="modal-close" onclick="closeModal()">太棒了！</button>
  </div>
</div>

<div class="container">
  <h1>✨ 幸运大转盘 ✨</h1>

  <!-- 奖品说明 -->
  <div class="prizes-info">
    <span class="prize-badge badge-1">🥇 一等奖 ×1 &nbsp;(5%)</span>
    <span class="prize-badge badge-2">🥈 二等奖 ×2 &nbsp;(15%)</span>
    <span class="prize-badge badge-3">🥉 三等奖 ×3 &nbsp;(30%)</span>
    <span class="prize-badge badge-c">🎀 安慰奖 ×4 &nbsp;(50%)</span>
  </div>

  <!-- 转盘 -->
  <div class="wheel-wrapper">
    <div class="wheel-glow"></div>
    <canvas id="wheelCanvas" width="420" height="420"></canvas>
    <div class="pointer"></div>
    <button class="center-btn" id="centerBtn" onclick="spin()">抽奖</button>
  </div>

  <!-- 抽奖次数 -->
  <div class="count-info">已抽奖 <span id="spinCount">0</span> 次</div>

  <!-- 大按钮 -->
  <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 开始抽奖</button>

  <!-- 历史记录 -->
  <div class="history">
    <h3>📜 抽奖记录</h3>
    <div class="history-list" id="historyList">
      <div style="color:rgba(255,255,255,0.3);font-size:0.8rem;text-align:center;">暂无记录，快来抽奖吧！</div>
    </div>
  </div>
</div>

<script>
// ========== 配置 ==========
const PRIZES = [
  {
    label: '一等奖',
    sublabel: '🥇',
    desc: '恭喜！您获得了最高荣誉一等奖！\n幸运之神眷顾着您！',
    prob: 0.05,
    color: '#FF3B3B',
    lightColor: '#FF6B6B',
    textColor: '#fff',
    emoji: '🏆',
    dotColor: '#FF3B3B',
    count: 1
  },
  {
    label: '二等奖',
    sublabel: '🥈',
    desc: '太棒了！二等奖属于您！\n运气相当不错哦～',
    prob: 0.15,
    color: '#FF8C00',
    lightColor: '#FFB347',
    textColor: '#fff',
    emoji: '🎖️',
    dotColor: '#FF8C00',
    count: 2
  },
  {
    label: '三等奖',
    sublabel: '🥉',
    desc: '恭喜获得三等奖！\n继续努力，下次更好！',
    prob: 0.30,
    color: '#2ECC71',
    lightColor: '#55E88F',
    textColor: '#fff',
    emoji: '🎗️',
    dotColor: '#2ECC71',
    count: 3
  },
  {
    label: '安慰奖',
    sublabel: '🎀',
    desc: '获得安慰奖！\n参与就是胜利，下次好运！',
    prob: 0.50,
    color: '#5B8CFF',
    lightColor: '#7EAAFF',
    textColor: '#fff',
    emoji: '🎁',
    dotColor: '#5B8CFF',
    count: 4
  }
];

// 展开成10个扇区（1+2+3+4=10）
const SECTORS = [];
PRIZES.forEach(p => {
  for (let i = 0; i < p.count; i++) {
    SECTORS.push(p);
  }
});
// SECTORS: [一等奖, 二等奖, 二等奖, 三等奖, 三等奖, 三等奖, 安慰奖, 安慰奖, 安慰奖, 安慰奖]

const N = SECTORS.length; // 10
const ARC = (2 * Math.PI) / N;

// ========== 画转盘 ==========
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const CX = canvas.width / 2;
const CY = canvas.height / 2;
const R = CX - 10;

let currentAngle = 0; // 当前旋转角度（弧度）
let isSpinning = false;
let spinCount = 0;

function drawWheel(rotAngle) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < N; i++) {
    const startAngle = rotAngle + i * ARC - Math.PI / 2;
    const endAngle = startAngle + ARC;
    const prize = SECTORS[i];

    // 扇区填充
    const grad = ctx.createRadialGradient(CX, CY, R * 0.1, CX, CY, R);
    grad.addColorStop(0, prize.lightColor);
    grad.addColorStop(1, prize.color);

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // 扇区边框
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 文字
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(startAngle + ARC / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = prize.textColor;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;

    ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
    ctx.fillText(prize.sublabel, R - 12, 6);

    ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
    ctx.fillText(prize.label, R - 36, 6);

    ctx.restore();
  }

  // 外圈装饰圆
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,215,0,0.6)';
  ctx.lineWidth = 4;
  ctx.stroke();

  // 外圈小圆点装饰
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * 2 * Math.PI + rotAngle;
    const dx = CX + (R + 2) * Math.cos(a);
    const dy = CY + (R + 2) * Math.sin(a);
    ctx.beginPath();
    ctx.arc(dx, dy, 3, 0, 2 * Math.PI);
    ctx.fillStyle = i % 2 === 0 ? '#ffd700' : '#fff';
    ctx.fill();
  }

  // 中心圆
  const centerGrad = ctx.createRadialGradient(CX - 8, CY - 8, 4, CX, CY, 36);
  centerGrad.addColorStop(0, '#fff9c4');
  centerGrad.addColorStop(0.5, '#ffd700');
  centerGrad.addColorStop(1, '#ff8c00');
  ctx.beginPath();
  ctx.arc(CX, CY, 36, 0, 2 * Math.PI);
  ctx.fillStyle = centerGrad;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
}

drawWheel(0);

// ========== 抽奖逻辑 ==========
function getWeightedResult() {
  const r = Math.random();
  let cumulative = 0;
  // 概率：一等奖5%，二等奖15%，三等奖30%，安慰奖50%
  const probs = [0.05, 0.15, 0.30, 0.50];
  const prizeIndex = [0, 1, 2, 3]; // 对应PRIZES索引
  for (let i = 0; i < probs.length; i++) {
    cumulative += probs[i];
    if (r < cumulative) {
      // 在该奖项的所有扇区中随机选一个
      const sectorIndices = [];
      SECTORS.forEach((s, idx) => { if (s === PRIZES[prizeIndex[i]]) sectorIndices.push(idx); });
      return sectorIndices[Math.floor(Math.random() * sectorIndices.length)];
    }
  }
  return SECTORS.length - 1;
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('centerBtn').disabled = true;

  const targetSector = getWeightedResult();
  const prize = SECTORS[targetSector];

  /**
   * 角度计算原理（修复版）：
   * drawWheel(rotAngle) 中，扇区 i 的起始角度为：rotAngle + i*ARC - π/2
   * 扇区 i 的中心角度为：rotAngle + i*ARC + ARC/2 - π/2
   *
   * 指针固定在顶部，即角度 -π/2（或等价的 3π/2）方向。
   * 要让扇区 i 的中心对准指针，需要：
   *   rotAngle + i*ARC + ARC/2 - π/2 = -π/2  (mod 2π)
   * 即：rotAngle = -(i*ARC + ARC/2)  (mod 2π)
   *
   * 所以目标 rotAngle（归一化到 [0, 2π)）= 2π - ((i*ARC + ARC/2) % 2π)
   * 再加上若干整圈确保顺时针旋转足够圈数。
   */
  const sectorMidOffset = targetSector * ARC + ARC / 2;
  // 目标角度（归一化到 [0, 2π)）
  const normalizedTarget = (2 * Math.PI - (sectorMidOffset % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  // 当前角度归一化
  const normalizedCurrent = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  // 顺时针需要转过的角度（保证 > 0）
  let delta = normalizedTarget - normalizedCurrent;
  if (delta < 0) delta += 2 * Math.PI;
  // 加上至少5圈的额外旋转
  const extraRounds = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const targetAngle = currentAngle + delta + extraRounds;

  const duration = 4000 + Math.random() * 1500;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const easedT = easeOut(t);
    currentAngle = startAngle + (targetAngle - startAngle) * easedT;
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle;
      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('centerBtn').disabled = false;
      spinCount++;
      document.getElementById('spinCount').textContent = spinCount;
      showResult(prize);
      addHistory(prize);
    }
  }

  requestAnimationFrame(animate);
}

// ========== 显示结果 ==========
function showResult(prize) {
  document.getElementById('modalEmoji').textContent = prize.emoji;
  document.getElementById('modalPrize').textContent = prize.label;
  document.getElementById('modalPrize').style.color = prize.lightColor;
  document.getElementById('modalDesc').textContent = prize.desc;
  document.getElementById('modalOverlay').classList.add('show');

  // 一等奖才放彩带
  if (prize.label === '一等奖' || prize.label === '二等奖') {
    launchConfetti(prize.label === '一等奖' ? 80 : 40);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  clearConfetti();
}

// ========== 历史记录 ==========
function addHistory(prize) {
  const list = document.getElementById('historyList');
  // 清除"暂无记录"提示
  if (list.children.length === 1 && list.children[0].style.color) {
    list.innerHTML = '';
  }
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-dot" style="background:${prize.dotColor}"></div>
    <span>${time}</span>
    <span style="color:${prize.lightColor};font-weight:bold;">${prize.emoji} ${prize.label}</span>
  `;
  list.insertBefore(item, list.firstChild);
  // 只保留最近20条
  while (list.children.length > 20) list.removeChild(list.lastChild);
}

// ========== 彩带 ==========
function launchConfetti(count) {
  const container = document.getElementById('confettiContainer');
  const colors = ['#ffd700','#ff3b3b','#5b8cff','#2ecc71','#ff8c00','#ff69b4','#fff'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      piece.style.width = (6 + Math.random() * 10) + 'px';
      piece.style.height = (6 + Math.random() * 10) + 'px';
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }, i * 30);
  }
}

function clearConfetti() {
  document.getElementById('confettiContainer').innerHTML = '';
}

// ========== 星星背景 ==========
(function initStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    container.appendChild(star);
  }
})();

// 点击遮罩关闭弹窗
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
